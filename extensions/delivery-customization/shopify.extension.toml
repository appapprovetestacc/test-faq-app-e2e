# Delivery Customization Function — transforms the list of
# delivery options shown at checkout. No network access.

api_version = "2025-10"

[[extensions]]
type = "function"
name = "t:extension.name"
handle = "appapprove-delivery-customization"
description = "Delivery-customization function starter generated by AppApprove."

  [extensions.build]
  command = ""
  path = "dist/function.wasm"

  [extensions.targeting]
  target = "cart.delivery-options.transform.run"
  input_query = "src/run.graphql"
  export = "run"
