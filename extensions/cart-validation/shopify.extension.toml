# Cart Validation Function — blocks checkout with merchant-
# defined error messages when cart fails business rules. Runs at cart-
# update time. No network access.

api_version = "2025-10"

[[extensions]]
type = "function"
name = "t:extension.name"
handle = "appapprove-cart-validation"
description = "Cart-validation function starter generated by AppApprove."

  [extensions.build]
  command = ""
  path = "dist/function.wasm"

  [extensions.targeting]
  target = "cart.validations.generate.run"
  input_query = "src/run.graphql"
  export = "run"
