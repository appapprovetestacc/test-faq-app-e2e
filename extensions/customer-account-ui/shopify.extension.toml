# AppApprove Customer Account UI extension. Renders inside the
# logged-in customer's order status / account pages. Available on all
# Shopify plans (no Plus gating needed).

api_version = "2025-10"

[[extensions]]
type = "ui_extension"
name = "t:extension.name"
handle = "appapprove-customer-account-ui"

  [[extensions.targeting]]
  module = "./src/CustomerAccount.tsx"
  target = "customer-account.order-status.block.render"

  [extensions.capabilities]
  network_access = false
  api_access = true
