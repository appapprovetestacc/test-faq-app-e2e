# Discount Function — applies discounts to cart lines. Runs
# at cart-update time; input is the cart, output is a list of discount
# applications. No network access (sandboxed).

api_version = "2025-10"

[[extensions]]
type = "function"
name = "t:extension.name"
handle = "appapprove-discount-function"
description = "Discount-function starter generated by AppApprove."

  [extensions.build]
  command = ""
  path = "dist/function.wasm"

  [extensions.targeting]
  target = "cart.lines.discounts.generate.run"
  input_query = "src/run.graphql"
  export = "run"
