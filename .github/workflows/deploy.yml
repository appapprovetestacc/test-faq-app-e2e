# AppApprove production deploy. Triggers on push to main; runs the real
# Remix + Vite build on GitHub Actions; deploys to Cloudflare Workers via
# wrangler. Lifecycle callbacks ping AppApprove so the dashboard shows
# build status. Don't edit by hand — re-run AppApprove's "Re-provision
# secrets" if anything goes wrong.

name: AppApprove Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: appapprove-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APPAPPROVE_PROJECT_ID: f807544b-0978-41fc-9755-4fffb32005fd
      DEPLOY_URL: ${{ secrets.APPAPPROVE_DEPLOY_URL }}
      DEPLOY_SECRET: ${{ secrets.APPAPPROVE_DEPLOY_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Notify queued
        if: always()
        run: bash .github/scripts/notify.sh queued ""

      # F-103 — DO NOT pin a version here. The scaffold's package.json
      # has `packageManager: "pnpm@10.4.1"` (Sprint Y/F-99B); the
      # action auto-picks that pin when no version is supplied. Setting
      # both causes ERR_PNPM_BAD_PM_VERSION.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # F-110 — Node 22 required because wrangler 4 (pinned via
          # wranglerVersion: "4" below) refuses to run on Node < 22.
          # On Node 20 wrangler-action's pre-flight version check fails,
          # falls back to `pnpm add wrangler@4` which then
          # ERR_PNPM_ADDING_TO_ROOT's in our pnpm-workspace setup. The
          # sandbox container (infra/docker/shopify-builder, node:22-
          # alpine) already runs 22, so this aligns CI with sandbox.
          node-version: 22

      # Manual pnpm-store cache. setup-node's built-in `cache: pnpm` aborts
      # the run when pnpm-lock.yaml is missing — and a freshly-scaffolded
      # AppApprove repo has no lockfile until the first `pnpm install` runs.
      # The hashFiles guard skips caching on the first run and engages once
      # a lockfile gets committed (run `pnpm install` locally and push).
      - name: Resolve pnpm store dir
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        if: hashFiles('pnpm-lock.yaml') != ''
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Notify building
        run: bash .github/scripts/notify.sh building ""

      # F-105 — explicit lockfile detection beats the fail-and-retry
       # pattern. The previous `--frozen-lockfile || pnpm install` worked
       # but always logged a scary ERR_PNPM_NO_LOCKFILE on the first run
       # (before the OR-fallback kicked in). Now we check first + run
       # the right command once.
      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Review smoke tests
        run: pnpm test

      - name: Performance budget
        run: pnpm test:performance

      # Phase 3.9 B — rewrite app/lib/build-meta.ts with the real deploy
      # commit + timestamp BEFORE the build bundles it. Without this step
      # the file ships the placeholder values from the AppApprove
      # scaffold-generation moment, so /version returns "unknown" + a
      # stale timestamp for the entire app's life. PKG_VERSION is read
      # from package.json so manual version bumps surface immediately.
      - name: Generate build metadata
        run: |
          set -euo pipefail
          PKG_VERSION=$(node -p "require('./package.json').version || '0.1.0'")
          BUILD_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DEPS=$(node -e '
            const p = require("./package.json");
            const all = { ...(p.dependencies||{}), ...(p.devDependencies||{}) };
            const out = Object.fromEntries(
              Object.entries(all).filter(([n]) => n.startsWith("@shopify/")),
            );
            process.stdout.write(JSON.stringify(out, null, 2));
          ')
          cat > app/lib/build-meta.ts <<EOF
          // Generated by .github/workflows/deploy.yml at deploy time. Do not edit.
          export const BUILD_VERSION = "${PKG_VERSION}";
          export const BUILD_GIT_SHA = "${GITHUB_SHA}";
          export const BUILD_TIMESTAMP = "${BUILD_TS}";
          export const DEPENDENCIES = ${DEPS} as const;
          EOF

      - name: Build
        run: pnpm build

      - name: Notify deploying
        run: bash .github/scripts/notify.sh deploying ""

      # F-118 — auto-provision CF D1 databases declared in wrangler.toml.
      # Without this the very first deploy fails twice:
      #   1) `wrangler d1 migrations apply` returns 7403 because the
      #      database_id is the placeholder `00000000-...` (no real DB).
      #   2) `wrangler deploy` refuses to bind a Worker to a non-existent
      #      D1 → entire deploy aborts.
      # Idempotent: tries to create; on "already exists" looks up the UUID
      # via `wrangler d1 list --json`. Patches wrangler.toml in-place
      # (working tree only — not committed back, so each deploy re-resolves
      # the UUID; cost is ~1-2s per deploy after the first).
      - name: Provision CF D1 databases
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -uo pipefail
          if [ ! -f wrangler.toml ]; then
            echo "No wrangler.toml — skipping D1 provisioning."
            exit 0
          fi
          # Extract (binding, database_name, database_id) triples from
          # each [[d1_databases]] block. Awk paragraph mode (RS='')
          # handles blank-line-separated TOML blocks.
          TRIPLES=$(awk -v RS='' -v ORS='\n' '
            /\[\[d1_databases\]\]/ {
              binding=""; name=""; id="";
              n=split($0, lines, "\n");
              for (i=1; i<=n; i++) {
                if (match(lines[i], /^[ \t]*binding[ \t]*=[ \t]*"([^"]+)"/, m)) binding=m[1];
                else if (match(lines[i], /^[ \t]*database_name[ \t]*=[ \t]*"([^"]+)"/, m)) name=m[1];
                else if (match(lines[i], /^[ \t]*database_id[ \t]*=[ \t]*"([^"]+)"/, m)) id=m[1];
              }
              if (name != "") print binding "\t" name "\t" id;
            }
          ' wrangler.toml)
          if [ -z "$TRIPLES" ]; then
            echo "No D1 databases declared in wrangler.toml — skipping."
            exit 0
          fi
          PLACEHOLDER="00000000-0000-0000-0000-000000000000"
          echo "$TRIPLES" | while IFS=$'\t' read -r binding name id; do
            [ -z "$name" ] && continue
            if [ "$id" != "$PLACEHOLDER" ] && [ -n "$id" ]; then
              echo "D1 binding=$binding name=$name already wired (id=$id) — skipping."
              continue
            fi
            echo "::group::Provision D1 binding=$binding name=$name"
            OUT=$(pnpm exec wrangler d1 create "$name" 2>&1 || true)
            echo "$OUT"
            # `|| true` — grep exits 1 when no UUID is in the output, which
            # is the normal "DB already exists" re-deploy path. Without the
            # mask, pipefail + GitHub-Actions's default `bash -e` aborts
            # the step before we can fall through to the list-and-lookup
            # path below (F-122).
            UUID=$(echo "$OUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1 || true)
            if [ -z "$UUID" ]; then
              echo "Create did not return a UUID; database may already exist. Listing…"
              LIST=$(pnpm exec wrangler d1 list --json 2>/dev/null || echo '[]')
              # Same pipefail-defense as above — jq exits 0 on no-match with
              # `-r` today, but `|| true` future-proofs against jq
              # behavior changes / pipe-segment errors.
              UUID=$(echo "$LIST" | jq -r --arg n "$name" '.[] | select(.name == $n) | .uuid' 2>/dev/null | head -1 || true)
            fi
            if [ -z "$UUID" ] || [ "$UUID" = "null" ]; then
              echo "::error::Could not provision or look up D1 database '$name'"
              exit 1
            fi
            echo "Got UUID=$UUID for D1 name=$name — patching wrangler.toml"
            # GNU-sed: replace ONLY the first placeholder occurrence so
            # multiple D1 blocks resolve serially without collision.
            sed -i "0,/database_id = \"$PLACEHOLDER\"/{s||database_id = \"$UUID\"|}" wrangler.toml
            echo "::endgroup::"
          done
          echo "Final [[d1_databases]] blocks in wrangler.toml:"
          awk '/^\[\[d1_databases\]\]/,/^[ \t]*$/' wrangler.toml || true

      # Phase 3.7 B + Sprint 11J — D1 migrations. Scans BOTH `migrations/`
      # (legacy AppApprove sync layer) and `drizzle/migrations/` (where
      # `drizzle-kit generate` puts files for any blueprint that uses
      # Drizzle ORM — Reviews, Subscriptions, etc.). Sprint 11J pre-fix:
      # this step `if` was `hashFiles('migrations/*.sql') != ''` only,
      # so any blueprint using Drizzle deployed without applying its
      # migrations and the Worker hit "no such table" at first request.
      #
      # When Drizzle is used we patch the [[d1_databases]] block in-place
      # to add `migrations_dir = "drizzle/migrations"` so wrangler picks
      # up files from there. Working-tree only — not committed back, so
      # each deploy re-applies the patch idempotently.
      #
      # Soft-fails so the very first deploy (when AppApprove still needs
      # to provision the D1 database id) doesn't break the rest of the
      # pipeline — the next deploy retries with a real database_id wired in.
      - name: Detect migrations dir
        id: migr
        run: |
          set -euo pipefail
          if compgen -G "migrations/*.sql" > /dev/null; then
            echo "dir=migrations" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          elif compgen -G "drizzle/migrations/*.sql" > /dev/null; then
            echo "dir=drizzle/migrations" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Patch wrangler.toml migrations_dir for Drizzle
        if: steps.migr.outputs.found == 'true' && steps.migr.outputs.dir == 'drizzle/migrations'
        run: |
          set -euo pipefail
          if [ ! -f wrangler.toml ]; then exit 0; fi
          # Add `migrations_dir = "drizzle/migrations"` to each
          # [[d1_databases]] block that doesn't already declare one. Awk
          # paragraph mode (RS='') walks block-by-block.
          TMP=$(mktemp)
          awk -v RS='' -v ORS='\n\n' '
            /\[\[d1_databases\]\]/ {
              if ($0 !~ /migrations_dir[ \t]*=/) {
                $0 = $0 "\nmigrations_dir = \"drizzle/migrations\""
              }
            }
            { print }
          ' wrangler.toml > "$TMP"
          mv "$TMP" wrangler.toml
          echo "Patched migrations_dir in wrangler.toml:"
          grep -n 'migrations_dir' wrangler.toml || true

      - name: Apply D1 migrations
        if: steps.migr.outputs.found == 'true'
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # F-104 — pin to wrangler 4 so the action skips its default
          # `pnpm add wrangler@3.90.0` install (which fails with
          # ERR_PNPM_ADDING_TO_ROOT in our pnpm-workspace setup) and
          # uses the wrangler 4 already in our devDependencies.
          wranglerVersion: "4"
          command: d1 migrations apply D1 --remote

      # F-113 — auto-provision CF Queues declared in wrangler.toml. Without
      # this the very first deploy fails with "Queue X does not exist" when
      # wrangler tries to bind the producer/consumer to a queue that has
      # never been created on the CF account. Idempotent via `|| true` —
      # already-existing queues report a non-zero exit but we proceed.
      # Greps wrangler.toml for `queue = "..."` lines (covers both
      # [[queues.producers]] and [[queues.consumers]] blocks).
      - name: Provision CF Queues
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -uo pipefail
          QUEUES=$(grep -E '^\s*queue\s*=' wrangler.toml 2>/dev/null | sed -E 's/.*"([^"]+)".*/\1/' | sort -u || true)
          if [ -z "$QUEUES" ]; then
            echo "No queues declared in wrangler.toml — skipping."
            exit 0
          fi
          echo "$QUEUES" | while IFS= read -r q; do
            [ -z "$q" ] && continue
            echo "::group::wrangler queues create $q"
            pnpm exec wrangler queues create "$q" 2>&1 || echo "(queue '$q' already exists or non-fatal error — continuing)"
            echo "::endgroup::"
          done

      # Sprint 11I — auto-provision CF R2 buckets declared in wrangler.toml.
      # Mirrors F-118 (D1) + F-113 (Queues). Without this, the first deploy
      # of any blueprint that uses R2 (Reviews/photo upload, Page Builder/
      # image-CDN, etc.) fails with "Authentication error" or "bucket does
      # not exist" when wrangler tries to bind a non-existent bucket.
      # Greps wrangler.toml for [[r2_buckets]] entries via awk paragraph
      # mode + extracts `bucket_name`. Idempotent — `wrangler r2 bucket
      # create` returns non-zero on already-exists; we mask + continue.
      #
      # IMPORTANT: requires CLOUDFLARE_API_TOKEN with "Workers R2 Storage:
      # Edit" scope. Tokens scoped only to Workers/D1 will fail here. The
      # warning message points the operator at the dashboard URL.
      - name: Provision CF R2 buckets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -uo pipefail
          if [ ! -f wrangler.toml ]; then
            echo "No wrangler.toml — skipping R2 provisioning."
            exit 0
          fi
          BUCKETS=$(awk -v RS='' -v ORS='\n' '
            /\[\[r2_buckets\]\]/ {
              n=split($0, lines, "\n");
              for (i=1; i<=n; i++) {
                if (match(lines[i], /^[ \t]*bucket_name[ \t]*=[ \t]*"([^"]+)"/, m)) print m[1];
              }
            }
          ' wrangler.toml | sort -u)
          if [ -z "$BUCKETS" ]; then
            echo "No R2 buckets declared in wrangler.toml — skipping."
            exit 0
          fi
          echo "$BUCKETS" | while IFS= read -r b; do
            [ -z "$b" ] && continue
            echo "::group::wrangler r2 bucket create $b"
            OUT=$(pnpm exec wrangler r2 bucket create "$b" 2>&1 || true)
            echo "$OUT"
            if echo "$OUT" | grep -qiE 'authentication|10000|unauthorized'; then
              echo "::error::Cloudflare API token is missing R2 permissions."
              echo "::error::Add 'Workers R2 Storage: Edit' scope at https://dash.cloudflare.com/profile/api-tokens"
              echo "::error::Then re-run this workflow."
              exit 1
            fi
            echo "::endgroup::"
          done

      # Phase 7.1 C — fetch user-provided env vars (BYOK-UI) from
      # AppApprove + inject them into the workflow environment. Each
      # entry becomes a real env var that wrangler-action picks up via
      # the rtsec.list output below. Plaintext is masked via
      # ::add-mask:: so it never appears in the workflow log.
      #
      # Auth: HMAC-SHA256 of empty body using the per-project deploy
      # secret (same secret the deploy-callback already uses). Server
      # verifies in /api/internal/projects/[slug]/env-vars/manifest.
      #
      # Failures: soft-fail. If the endpoint is unreachable or auth
      # fails, log a warning + continue with the static secrets list.
      # Reasoning: AppApprove being temporarily down shouldn't block a
      # critical hotfix deploy; the user-keys integration just won't
      # work until the next deploy with AppApprove healthy.
      - name: Fetch user env vars
        id: userenv
        env:
          DEPLOY_URL: ${{ secrets.APPAPPROVE_DEPLOY_URL }}
          DEPLOY_SECRET: ${{ secrets.APPAPPROVE_DEPLOY_SECRET }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -uo pipefail
          if [ -z "${DEPLOY_URL:-}" ] || [ -z "${DEPLOY_SECRET:-}" ]; then
            echo "::notice::APPAPPROVE_DEPLOY_URL/SECRET unset — skipping user env-vars fetch."
            echo "names<<__EOF__" >> "$GITHUB_OUTPUT"
            echo "__EOF__" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Slug = GH repo name, by AppApprove provisioning convention.
          SLUG="$REPO_NAME"
          # HMAC of empty body. `echo -n ""` produces zero bytes; openssl
          # outputs "(stdin)= <hex>"; awk grabs the trailing hex.
          SIG=$(printf '' | openssl dgst -sha256 -hmac "$DEPLOY_SECRET" -hex | awk '{print $NF}')
          URL="${DEPLOY_URL%/}/api/internal/projects/$SLUG/env-vars/manifest"
          RESP=$(curl -sS -m 30 \
                      -H "X-AppApprove-Signature: sha256=$SIG" \
                      -H "Accept: application/json" \
                      "$URL" || true)
          if [ -z "$RESP" ]; then
            echo "::warning::User-env manifest fetch failed (empty response). Skipping."
            echo "names<<__EOF__" >> "$GITHUB_OUTPUT"
            echo "__EOF__" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Parse via Node — jq isn't on the runner image by default.
          ENTRIES=$(node -e '
            try {
              const r = JSON.parse(process.argv[1] || "{}");
              const e = Array.isArray(r.entries) ? r.entries : [];
              for (const x of e) {
                if (!x || typeof x.key !== "string" || typeof x.value !== "string") continue;
                process.stdout.write(x.key + "\t" + x.value + "\n");
              }
            } catch (err) {
              process.stderr.write("manifest parse failed: " + err.message + "\n");
              process.exit(1);
            }
          ' "$RESP" || echo "")
          NAMES=()
          if [ -n "$ENTRIES" ]; then
            while IFS=$'\t' read -r KEY VAL; do
              if [ -z "$KEY" ]; then continue; fi
              # Mask BEFORE writing so the value never appears unmasked.
              echo "::add-mask::$VAL"
              echo "$KEY=$VAL" >> "$GITHUB_ENV"
              NAMES+=("$KEY")
            done <<< "$ENTRIES"
            echo "::notice::Loaded ${#NAMES[@]} user env var(s)"
          else
            echo "::notice::No user env vars set for this project"
          fi
          {
            echo "names<<__EOF__"
            if [ ${#NAMES[@]} -gt 0 ]; then printf '%s\n' "${NAMES[@]}"; fi
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      # F-111 — build the secrets list dynamically so the wrangler-action
      # only tries to upload secrets whose value is actually set in the
      # repo's GitHub Secrets. Empty values cause "Value for secret X not
      # found in environment" + the whole deploy aborts. SHOPIFY_API_SECRET
      # is unset until the user has connected a Shopify Partner App, so
      # the very first bootstrap deploy must tolerate its absence.
      #
      # Phase 7.1 C — also unions in the user-env-var names from the
      # userenv step so wrangler-action pushes them as Worker secrets.
      - name: Build runtime-secrets list
        id: rtsec
        env:
          SYNC_STATUS_TOKEN: ${{ secrets.SYNC_STATUS_TOKEN }}
          SHOPIFY_API_SECRET: ${{ secrets.SHOPIFY_API_SECRET }}
          APPAPPROVE_DEPLOY_URL: ${{ secrets.APPAPPROVE_DEPLOY_URL }}
          APPAPPROVE_DEPLOY_SECRET: ${{ secrets.APPAPPROVE_DEPLOY_SECRET }}
          USER_ENV_NAMES: ${{ steps.userenv.outputs.names }}
        run: |
          set -euo pipefail
          NAMES=()
          for var in SYNC_STATUS_TOKEN SHOPIFY_API_SECRET APPAPPROVE_DEPLOY_URL APPAPPROVE_DEPLOY_SECRET; do
            if [ -n "${!var:-}" ]; then NAMES+=("$var"); fi
          done
          # Phase 7.1 C — append user env var names. They were written
          # to $GITHUB_ENV by the userenv step, so they're already
          # visible as real env vars when wrangler-action runs.
          if [ -n "${USER_ENV_NAMES:-}" ]; then
            while IFS= read -r NAME; do
              if [ -n "$NAME" ]; then NAMES+=("$NAME"); fi
            done <<< "$USER_ENV_NAMES"
          fi
          {
            echo "list<<__EOF__"
            printf '%s\n' "${NAMES[@]}"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare
        id: cf
        uses: cloudflare/wrangler-action@v3
        env:
          # Phase 3.7 B + 3.8 B — Worker runtime secrets. wrangler-action's
          # `secrets` input pushes these via `wrangler secret put` before
          # the deploy. Order matters: secrets land before the Worker
          # boots so the new env is live on the first request. The
          # `secrets:` field references rtsec.list which omits empty
          # values (F-111).
          SYNC_STATUS_TOKEN: ${{ secrets.SYNC_STATUS_TOKEN }}
          SHOPIFY_API_SECRET: ${{ secrets.SHOPIFY_API_SECRET }}
          # APPAPPROVE_DEPLOY_URL + _SECRET are already set as repo env
          # secrets for the deploy-callback bash step; re-using them here
          # exposes them inside the Worker so reportToAppApprove() in
          # app/lib/merchant-qa.server.ts can sign QA feedback + event
          # ingest POSTs back to the AppApprove host.
          APPAPPROVE_DEPLOY_URL: ${{ secrets.APPAPPROVE_DEPLOY_URL }}
          APPAPPROVE_DEPLOY_SECRET: ${{ secrets.APPAPPROVE_DEPLOY_SECRET }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # F-104 — see Apply D1 migrations step above for rationale.
          wranglerVersion: "4"
          command: deploy
          secrets: ${{ steps.rtsec.outputs.list }}

      # Phase 7 E2 — preview Worker deploy. Same script bundle as the
      # production deploy above, but pushed to the appapprove-app-{slug}-
      # preview Worker which has PREVIEW_MODE=1 baked in vars. The
      # preview Worker's auth-bypass + GraphQL short-circuit (in app/lib/
      # shopify.server.ts + shopify-api.server.ts) gate on that flag so
      # the embedded admin UI renders with mock fixtures when accessed
      # via ?preview=1. Used by the post-deploy Playwright pass (7 E3)
      # for screenshots + by the project preview iframe (7 E4).
      #
      # Soft-fail with continue-on-error: if the preview deploy breaks,
      # the production deploy already succeeded and the customer's app
      # is reachable. Preview is a nice-to-have, not a blocker.
      - name: Deploy preview Worker
        if: success()
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: deploy --env preview
          # Don't push runtime secrets to the preview Worker — the
          # bypass code paths never read them. Cleaner threat model:
          # zero real secrets in the preview Worker means a leak there
          # exposes nothing.

      # Phase 3.6 D — extension-aware deploy. Skips silently when there
      # are no extensions or when SHOPIFY_CLI_PARTNERS_TOKEN isn't
      # provisioned yet (AppApprove writes that secret out-of-band; the
      # CF Worker deploy still succeeds on its own when the token's
      # missing). The CLI publishes a new extension version per push;
      # extension activation in the Partner Dashboard remains manual
      # because Shopify gates that step behind merchant approval.
      - name: Detect extensions
        id: ext
        if: success()
        run: |
          if [ -d extensions ] && [ -n "$(ls -A extensions 2>/dev/null)" ]; then
            echo "has=true" >> $GITHUB_OUTPUT
          else
            echo "has=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Shopify extensions
        if: success() && steps.ext.outputs.has == 'true' && env.SHOPIFY_CLI_PARTNERS_TOKEN != ''
        env:
          SHOPIFY_CLI_PARTNERS_TOKEN: ${{ secrets.SHOPIFY_CLI_PARTNERS_TOKEN }}
          SHOPIFY_API_KEY: ${{ secrets.SHOPIFY_API_KEY }}
          SHOPIFY_API_SECRET: ${{ secrets.SHOPIFY_API_SECRET }}
        run: |
          pnpm dlx @shopify/cli@latest app deploy --force --no-release

      - name: Notify ready
        if: success()
        run: bash .github/scripts/notify.sh ready ""

      # Phase 3.5 B — post-deploy Playwright run + result ingest. Runs
      # against the freshly-deployed URL. Soft-fails so a Playwright
      # failure doesn't break the whole deploy — the result still posts
      # to AppApprove and the Submit-flow tier-gating decides whether
      # to block submit.
      - name: Install Playwright browsers
        if: success()
        run: pnpm dlx playwright install chromium --with-deps

      - name: Run Playwright review tests
        if: success()
        id: pw
        continue-on-error: true
        env:
          # APPAPPROVE_HOSTING_DOMAIN secret is pushed by AppApprove at
          # provisioning time (defaults to "appapprove.app" when the host
          # uses the standard hosting zone). Custom-domain projects + self-
          # hosted forks override the secret. The Worker name pattern
          # ("appapprove-app-<slug>") is set by lib/deployments.ts on the
          # AppApprove host — keep in sync with productionWorkerName().
          APP_BASE_URL: https://appapprove-app-${{ env.APPAPPROVE_PROJECT_SLUG }}.${{ secrets.APPAPPROVE_HOSTING_DOMAIN || 'appapprove.app' }}
        run: pnpm test:browser --reporter=json > playwright-results.json || true

      - name: Post Playwright results to AppApprove
        if: always() && steps.pw.outcome != 'skipped'
        env:
          DEPLOY_URL: ${{ secrets.APPAPPROVE_DEPLOY_URL }}
          DEPLOY_SECRET: ${{ secrets.APPAPPROVE_DEPLOY_SECRET }}
          PROJECT_SLUG: ${{ env.APPAPPROVE_PROJECT_SLUG }}
        run: bash .github/scripts/post-playwright.sh

      # Phase 4 Sprint A — capture listing screenshots from canonical
      # routes and POST each to /api/screenshots/<slug>. Non-fatal on
      # capture failure; the post-script also no-ops when the dir is
      # empty (e.g. non-embedded surfaces).
      #
      # Phase 7 E3 — switched the capture URL from production Worker to
      # the preview Worker (appapprove-app-{slug}-preview, deployed in
      # Phase 7 E2). The preview Worker has PREVIEW_MODE=1 so the auth-
      # bypass in app/lib/shopify.server.ts returns mock session for
      # any request with ?preview=1 in the URL — and the GraphQL client
      # short-circuit in shopify-api.server.ts returns fixture data
      # instead of hitting the (non-existent) preview shop's Admin API.
      # Result: screenshots show the actual Polaris embedded admin UI
      # with mock products/orders/customers, not OAuth landing pages.
      #
      # PLAYWRIGHT_SHOP env override: the screenshot test in
      # tests/screenshots.spec.ts adds ?shop=<this>&host=<derived> to
      # embedded routes. We override to the preview sentinel so the
      # bypass branch is reached.
      - name: Capture listing screenshots
        if: success()
        id: shots
        continue-on-error: true
        env:
          APP_BASE_URL: https://appapprove-app-${{ env.APPAPPROVE_PROJECT_SLUG }}-preview.workers.dev
          PLAYWRIGHT_SHOP: appapprove-preview.myshopify.com
        run: pnpm playwright test tests/screenshots.spec.ts || true

      - name: Post screenshots to AppApprove
        if: always() && steps.shots.outcome != 'skipped'
        env:
          DEPLOY_URL: ${{ secrets.APPAPPROVE_DEPLOY_URL }}
          DEPLOY_SECRET: ${{ secrets.APPAPPROVE_DEPLOY_SECRET }}
          PROJECT_SLUG: ${{ env.APPAPPROVE_PROJECT_SLUG }}
        run: bash .github/scripts/post-screenshots.sh

      # UX-2 (F-117 fix) — robust outcome notification. The original
      # `if: failure()` skipped on **cancellation** and on **runner
      # timeout**, which left the UI stuck on "Deploying" forever.
      # `if: always()` fires regardless of step state + branches on
      # job.status:
      #   - success path: already covered by the earlier "Notify ready"
      #     (kept for immediate UI feedback after Deploy lands, before
      #     Playwright + screenshots run).
      #   - failure / cancelled / timed-out: this fires "failed" so
      #     the UI flips off "Deploying".
      # No double-notification on success because the backend
      # idempotently upserts the deployment record and we only POST
      # "failed" here when job.status != success.
      - name: Notify final status
        if: always()
        run: |
          if [ "${{ job.status }}" != "success" ]; then
            bash .github/scripts/notify.sh failed ""
          fi
